let currentFilter = 'all';

function getState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; }
}
function saveState(s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }
function isDone(id) { return !!getState()[id]; }

function toggleTask(id) {
  const s = getState();
  s[id] = !s[id];
  saveState(s);
  render();
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    const lbl = b.textContent.toLowerCase();
    b.classList.toggle('active', (f === 'all' && lbl.includes('todos')) || (f === 'pending' && lbl.includes('pendentes')) || (f === 'done' && lbl.includes('feitos')));
  });
  render();
}

function toggleTheme() {
  const h = document.documentElement;
  h.setAttribute('data-theme', h.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}

function getEvals() { try { return JSON.parse(localStorage.getItem(EVAL_KEY) || '[]'); } catch { return []; } }
function saveEvals(e) { localStorage.setItem(EVAL_KEY, JSON.stringify(e)); }

function evalAnswer(id, rating) {
  const task = TASKS.find(t => t.id === id);
  if (!task) return;
  let evals = getEvals();
  const existing = evals.find(e => e.taskId === id);
  const entry = { taskId: id, rating, proposed_answer: task.proposed_answer, actual_answer: existing ? existing.actual_answer : null, rated_at: new Date().toISOString() };
  evals = evals.filter(e => e.taskId !== id);
  evals.push(entry);
  saveEvals(evals);
  const panel = document.getElementById('panel-' + id);
  if (panel) panel.classList.toggle('visible', rating === 'down');
  render();
}

function saveActual(id) {
  const ta = document.getElementById('actual-' + id);
  if (!ta) return;
  let evals = getEvals();
  const entry = evals.find(e => e.taskId === id);
  if (entry) { entry.actual_answer = ta.value; saveEvals(evals); }
  const panel = document.getElementById('panel-' + id);
  if (panel) { panel.classList.remove('visible'); }
}

function copyAnswer(id) {
  const el = document.getElementById('answer-' + id);
  if (!el) return;
  navigator.clipboard.writeText(el.innerText).then(() => {
    const btn = document.querySelector('[data-copy="' + id + '"]');
    if (btn) { btn.textContent = 'Copiado!'; setTimeout(() => { btn.textContent = 'Copiar'; }, 1500); }
  });
}

function exportEvals() {
  const evals = getEvals().filter(e => e.rating === 'down');
  if (!evals.length) { alert('Sem thumbs-down para exportar.'); return; }
  const blob = new Blob([JSON.stringify(evals, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'slack-evals-tech-group.json';
  a.click();
}

function taskHTML(t) {
  const done = isDone(t.id);
  const evals = getEvals();
  const ev = evals.find(e => e.taskId === t.id);
  const rating = ev ? ev.rating : null;
  const hidden = (currentFilter === 'pending' && done) || (currentFilter === 'done' && !done);

  let metaTags = `<span class="tag ${t.channelType}">${t.channel}</span>`;
  metaTags += `<span class="tag sender">👤 ${t.sender}</span>`;
  if (t.priority === 'high') metaTags += `<span class="tag priority-high">🔴 Urgente</span>`;
  if (t.escalate_to_tech) metaTags += `<span class="tag escalate">⬆️ Escalar para Tech</span>`;

  let answerBlock = '';
  if (t.proposed_answer) {
    const upClass = rating === 'up' ? 'active-up' : '';
    const downClass = rating === 'down' ? 'active-down' : '';
    const panelClass = rating === 'down' ? 'actual-answer-panel visible' : 'actual-answer-panel';
    const savedActual = ev && ev.actual_answer ? ev.actual_answer : '';
    const answerHtml = t.proposed_answer.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    answerBlock = `
      <div class="proposed-answer" onclick="event.stopPropagation()">
        <div class="proposed-answer-header">
          <span class="ai-badge">🤖 AI assisted</span>
          <div class="answer-actions">
            <button class="copy-btn" data-copy="${t.id}" onclick="copyAnswer('${t.id}')">Copiar</button>
            <button class="eval-btn ${upClass}" onclick="evalAnswer('${t.id}','up')">👍</button>
            <button class="eval-btn ${downClass}" onclick="evalAnswer('${t.id}','down')">👎</button>
          </div>
        </div>
        <div class="proposed-answer-text" id="answer-${t.id}">${answerHtml}</div>
        <div class="${panelClass}" id="panel-${t.id}">
          <label>Resposta que enviaste (para melhorar o modelo):</label>
          <textarea id="actual-${t.id}" placeholder="Cola aqui a resposta que enviaste..." rows="3">${savedActual}</textarea>
          <button onclick="saveActual('${t.id}')">Guardar</button>
        </div>
      </div>`;
  }

  return `
    <div class="task-item${done ? ' done' : ''}${hidden ? ' hidden' : ''}" onclick="toggleTask('${t.id}')">
      <div class="task-checkbox">${done ? '✓' : ''}</div>
      <div class="task-body">
        <div class="task-meta">${metaTags}</div>
        <div class="task-text">${t.text}</div>
        ${answerBlock}
        <div class="task-action" onclick="event.stopPropagation()">
          <a class="slack-link" href="${t.permalink}" target="_blank">💬 Open thread</a>
          <span class="task-date">${t.date}</span>
        </div>
      </div>
    </div>`;
}

function render() {
  const urgent = TASKS.filter(t => t.priority === 'high');
  const decisions = TASKS.filter(t => t.priority !== 'high' && (t.text.startsWith('Decisão:') || t.text.startsWith('Aprovar')));
  const rest = TASKS.filter(t => t.priority !== 'high' && !t.text.startsWith('Decisão:') && !t.text.startsWith('Aprovar'));

  let html = '';
  if (urgent.length) {
    html += `<div class="section-label">🔴 Urgente (${urgent.length})</div>`;
    html += urgent.map(taskHTML).join('');
  }
  if (decisions.length) {
    html += `<div class="section-label">⚖️ Decisões Pendentes (${decisions.length})</div>`;
    html += decisions.map(taskHTML).join('');
  }
  if (rest.length) {
    html += `<div class="section-label">💬 Respostas Pendentes (${rest.length})</div>`;
    html += rest.map(taskHTML).join('');
  }

  document.getElementById('task-list').innerHTML = html;

  const total = TASKS.length;
  const done = TASKS.filter(t => isDone(t.id)).length;
  const pending = total - done;
  const pct = total ? Math.round(done / total * 100) : 0;

  document.getElementById('m-total').textContent = total;
  document.getElementById('m-pending').textContent = pending;
  document.getElementById('m-done').textContent = done;
  document.getElementById('m-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
}

render();
</script>
