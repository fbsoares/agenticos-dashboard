let currentFilter = 'all';

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}

function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function toggleTask(id) {
  const state = loadState();
  state[id] = !state[id];
  saveState(state);
  renderAll();
}

function getEvals() {
  try { return JSON.parse(localStorage.getItem(EVAL_KEY) || '[]'); }
  catch { return []; }
}

function saveEvals(e) { localStorage.setItem(EVAL_KEY, JSON.stringify(e)); }

function evalAnswer(id, rating) {
  const task = TASKS.find(t => t.id === id);
  if (!task) return;
  let evals = getEvals();
  const existing = evals.find(e => e.taskId === id);
  const entry = {
    taskId: id,
    rating,
    proposed_answer: task.proposed_answer,
    actual_answer: existing ? existing.actual_answer : null,
    rated_at: new Date().toISOString()
  };
  evals = evals.filter(e => e.taskId !== id);
  evals.push(entry);
  saveEvals(evals);
  const panel = document.getElementById('panel-' + id);
  if (panel) panel.classList.toggle('visible', rating === 'down');
  renderAll();
}

function saveActual(id) {
  const ta = document.getElementById('actual-' + id);
  if (!ta) return;
  let evals = getEvals();
  const entry = evals.find(e => e.taskId === id);
  if (entry) { entry.actual_answer = ta.value; saveEvals(evals); }
  const panel = document.getElementById('panel-' + id);
  if (panel) panel.classList.remove('visible');
}

function copyAnswer(id) {
  const el = document.getElementById('answer-' + id);
  if (!el) return;
  navigator.clipboard.writeText(el.innerText).then(() => {
    const btn = document.querySelector('[data-copy="' + id + '"]');
    if (btn) { btn.textContent = 'Copiado!'; setTimeout(() => btn.textContent = 'Copiar', 1500); }
  });
}

function exportEvals() {
  const evals = getEvals().filter(e => e.rating === 'down');
  if (!evals.length) { alert('Sem thumbs-down para exportar.'); return; }
  const blob = new Blob([JSON.stringify(evals, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'slack-evals-' + META.searchId + '.json';
  a.click();
}

function renderTask(task, isDone, taskEval) {
  const isHidden = (currentFilter === 'pending' && isDone) || (currentFilter === 'done' && !isDone);
  const channelClass = task.channelType === 'dm' ? 'dm' : 'channel';
  const channelIcon = task.channelType === 'dm' ? '💬' : '#';

  const upClass = taskEval && taskEval.rating === 'up' ? ' active-up' : '';
  const downClass = taskEval && taskEval.rating === 'down' ? ' active-down' : '';
  const panelVisible = taskEval && taskEval.rating === 'down' ? ' visible' : '';
  const savedActual = (taskEval && taskEval.actual_answer) ? taskEval.actual_answer.replace(/"/g, '&quot;') : '';

  const answerBlock = task.proposed_answer ? `
    <div class="proposed-answer" onclick="event.stopPropagation()">
      <div class="proposed-answer-header">
        <span class="ai-badge">🤖 AI assisted</span>
        <div class="answer-actions">
          <button class="copy-btn" data-copy="${task.id}" onclick="copyAnswer('${task.id}')">Copiar</button>
          <button class="eval-btn thumb-up${upClass}" onclick="evalAnswer('${task.id}','up')">👍</button>
          <button class="eval-btn thumb-down${downClass}" onclick="evalAnswer('${task.id}','down')">👎</button>
        </div>
      </div>
      <div class="proposed-answer-text" id="answer-${task.id}">${task.proposed_answer.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
      <div class="actual-answer-panel${panelVisible}" id="panel-${task.id}">
        <label>Resposta que enviaste (para melhorar o modelo):</label>
        <textarea id="actual-${task.id}" placeholder="Cola aqui a resposta que enviaste..." rows="3">${savedActual}</textarea>
        <button onclick="saveActual('${task.id}')">Guardar</button>
      </div>
    </div>` : '';

  return `
    <div class="task-item ${isDone ? 'done' : ''} ${isHidden ? 'hidden' : ''}"
         id="task-${task.id}"
         onclick="toggleTask('${task.id}')">
      <div class="task-checkbox"></div>
      <div class="task-body">
        <div class="task-meta">
          <span class="tag ${channelClass}">${channelIcon} ${task.channel}</span>
          <span class="tag sender">👤 ${task.sender}</span>
          ${task.priority === 'high' ? '<span class="tag priority-high">🔴 Urgente</span>' : ''}
          ${task.escalate_to_tech ? '<span class="tag escalate">⬆️ Escalar para Tech</span>' : ''}
        </div>
        <div class="task-text">${task.text}</div>
        ${answerBlock}
        <div class="task-action" onclick="event.stopPropagation()">
          <a class="slack-link" href="${task.permalink}" target="_blank">
            💬 Open thread
          </a>
          <span style="font-size:0.72rem;color:var(--text2);margin-left:0.25rem">${task.date}</span>
        </div>
      </div>
    </div>
  `;
}

function renderAll() {
  const state = loadState();
  const evals = getEvals();
  const container = document.getElementById('task-list');

  const sections = [
    { label: 'Urgente', filter: t => t.priority === 'high' },
    { label: 'Decisões Pendentes', filter: t => t.priority !== 'high' && (t.text.startsWith('Decisão:') || t.text.startsWith('Aprovar')) },
    { label: 'Respostas Pendentes', filter: t => t.priority !== 'high' && !t.text.startsWith('Decisão:') && !t.text.startsWith('Aprovar') },
  ];

  let html = '';
  sections.forEach(section => {
    const sectionTasks = TASKS.filter(section.filter);
    if (!sectionTasks.length) return;

    const visibleInSection = sectionTasks.filter(t => {
      const isDone = !!state[t.id];
      return (currentFilter === 'all') || (currentFilter === 'done' && isDone) || (currentFilter === 'pending' && !isDone);
    });
    if (!visibleInSection.length && currentFilter !== 'all') return;

    html += `<div class="section-header">${section.label}</div>`;
    sectionTasks.forEach(task => {
      const taskEval = evals.find(e => e.taskId === task.id) || null;
      html += renderTask(task, !!state[task.id], taskEval);
    });
  });

  container.innerHTML = html;

  const total = TASKS.length;
  const done = TASKS.filter(t => !!state[t.id]).length;
  const pending = total - done;
  const pct = Math.round((done / total) * 100);

  document.getElementById('m-total').textContent = total;
  document.getElementById('m-done').textContent = done;
  document.getElementById('m-pending').textContent = pending;
  document.getElementById('m-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
}

function setFilter(f) {
  currentFilter = f;
  ['all','pending','done'].forEach(k => {
    document.getElementById('btn-' + k).classList.toggle('active', k === f);
  });
  renderAll();
}

function toggleTheme() {
  const html = document.documentElement;
  html.dataset.theme = html.dataset.theme === 'dark' ? 'light' : 'dark';
}

renderAll();
</script>
